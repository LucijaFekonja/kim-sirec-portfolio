<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kim Širec — Contact</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Text&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="contact-dark">
  <div class="custom-cursor" id="cursor"></div>

  <a class="contact-x" href="index.html" aria-label="Back to homepage">
    <span></span>
    <span></span>
  </a>

  <div
    class="page-transition-circle reverse"
    id="pageTransitionCircleReverse"
    aria-hidden="true"
  ></div>

  <div
    class="contact-transition-overlay reverse"
    id="contactTransitionOverlayReverse"
    aria-hidden="true"
  >
    <div class="contact-transition-x" id="contactTransitionXReverse">
      <span></span>
      <span></span>
    </div>
  </div>

  <main class="contact-page">
    <div class="contact-content">
      <h1 class="contact-name">Kim Širec</h1>
      <p class="contact-bio">
        photography portfolio focused on architecture, interiors, and spatial detail
      </p>
      <p class="contact-break-line"></p>
      <div class="contact-links">
        <a href="mailto:kim.sirec100@gmail.com">kim.sirec100@gmail.com</a>
        <a
          href="https://instagram.com/sladkomleko/"
          target="_blank"
          rel="noreferrer"
          aria-label="Instagram"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5" />
            <circle cx="12" cy="12" r="4" />
            <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" />
          </svg>
        </a>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
